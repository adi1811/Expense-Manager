  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select 
          expense_id,
          expense_name,
          expense_type,
          expense_amount,
          transcation_date,
          Group_id,
          note
              from expense where expense_id in (
                  select expense_id from expense where group_id = :P3_GROUP_ID
              );
      

