- # ====== Process: Get Group Name =============================
  id: 154784938675906212003
  identification: 
    name: Get Group Name
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      select group_name into :P3_GROUP_NAME 
      from group_details where group_id = :P3_GROUP_ID;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

