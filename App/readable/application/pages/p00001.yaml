    type: SQL Query
    sql-query: |
      select grp.group_id, grp.group_name, grp.category, grp.description 
      from group_details grp join user_group ug on grp.group_id = ug.group_id
       join user_detail usr on ug.user_id = usr.user_id where usr.user_name = :app_user;

