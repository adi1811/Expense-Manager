processes: 
- # ====== Process: Load User ==================================
  id: 146643407197570658623
  identification: 
    name: Load User
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare 
          v_user_id number;
      Begin
          select nvl(max(user_id),-1)
                  into v_user_id
                  from user_detail 
                  where user_name = :app_user;
           
           If v_user_id = -1
              Then
                  insert into user_detail(
                      user_id,
                      user_name,
                      first_name,
                      last_name,
                      email
                  )
                  select
                      seq_usr_id.nextval,
                      awpu.user_name,
                      awpu.first_name,
                      awpu.last_name,
                      lower(awpu.email)
                  from apex_workspace_apex_users awpu
                  where user_name = :app_user;
            End IF;
      
      End;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

