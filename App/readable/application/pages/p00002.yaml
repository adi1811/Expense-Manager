- # ====== Process: Process form New Group =====================
  id: 154570154830183238562
  identification: 
    name: Process form New Group
    type: Form - Automatic Row Processing (DML)
    execution-chain: None
    form-region: New Group # 154570147493715238551

  settings: 
    target-type: PL/SQL Code
    pl/sql-code-to-insert/update/delete: |
      declare
          v_user_id user_detail.user_id%type;
          v_group_id group_details.group_id%type;
      Begin
          select user_id into v_user_id from user_detail where user_name = :app_user;
      
          insert into group_details grp (grp.group_id, grp.group_name, grp.category, grp.description)
          values(seq_group_id.NEXTVAL,
          :P2_GROUP_NAME,
          :P2_CATEGORY,
          :P2_DESCRIPTION)returning group_id into v_group_id;
      
          Insert into user_group(usr_del_id,group_id,user_id)
              values(seq_usr_del_id.NEXTVAL,v_group_id,v_user_id);
      End;
    prevent-lost-updates: true
    lock-row: Yes

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

