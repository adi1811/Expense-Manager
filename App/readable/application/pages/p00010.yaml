processes: 
- # ====== Process: add user to group ==========================
  id: 154784941470395212031
  identification: 
    name: add user to group
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare
          v_selected apex_t_varchar2;
      Begin
          v_selected := apex_string.split(:p10_member,':');
          for i in 1..v_selected.count loop
              insert into user_group(usr_del_id,user_id,group_id) values
              (seq_usr_del_id.nextval,v_selected(i),:P8_group_id);
          END LOOP;
      END;

  execution: 
    sequence: 10
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: Save # 154784941350917212030

