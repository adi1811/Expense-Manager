buttons: 
- # ====== Button: Add_member ==================================
  id: 154784940736667212024
  identification: 
    button-name: Add_member
    label: Add Member

  layout: 
    sequence: 10
    region: member # 154784940222506212019
    slot: COPY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    button-template: Text with Icon
    hot: true
    template-options: 
    - '#DEFAULT#'
    - t-Button--iconLeft
    icon: fa-address-book-o

  behavior: 
    action: Redirect to Page in this Application
    target: 
      url: 'f?p=&APP_ID.:10:&SESSION.::&DEBUG.::P10_GROUP_ID:&P8_GROUP_ID.'
      page: 10 # ADD MEMBER
      values: 
        p10_group_id: '&P8_GROUP_ID.'

    warn-on-unsaved-changes: Do Not Check

dynamic-actions: 
- # ====== Dynamic Action: Dialog Closed =======================
  id: 154784941866355212035
  identification: 
    name: Dialog Closed

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Dialog Closed
    selection-type: jQuery Selector
    jquery-selector: Body

  actions: 
  - # ====== Action: Refresh =====================================
    id: 154784941987285212036
    identification: 
      action: Refresh

    settings: 
      maintain-pagination: false

    affected-elements: 
      selection-type: Region
      region: member # 154784940222506212019

    execution: 
      sequence: 10
      event: Dialog Closed # 154784941866355212035
      fire-when-event-result-is: True
      fire-on-initialization: false

