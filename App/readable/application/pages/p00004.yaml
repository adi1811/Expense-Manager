- # ====== Page Item: P4_PAYER =================================
  id: 154784938828313212005
  identification: 
    name: P4_PAYER
    type: Select List

  label: 
    label: Payer
    alignment: Left

  settings: 
    page-action-on-selection: None

  multiple-values: 
    type: No

  layout: 
    sequence: 60
    region: Add Expense # 154787834744827757470
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'
    height: 1

  validation: 
    value-required: true

  list-of-values: 
    type: SQL Query
    sql-query: |
      select 
          user_name as d,
          user_id as r
              from user_detail 
              where user_id in (
                  select user_id 
                  from user_group
                      where group_id = :p4_group_id
              );
    display-extra-values: true
    display-null-value: true

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      if :P4_EXPENSE_ID is not null
      Then
          Begin
              select
                  lender_user_id
              into
                  :P4_PAYER
              from
                  amount_detail
              where 
                  expense_id = :P4_EXPENSE_ID
               and group_id = :P4_GROUP_ID
               and rownum = 1;
              return :P4_PAYER;
          Exception
              when no_data_found then
                  return null;
           end;
      end if;
      return null;
    used: Always, replacing any existing value in session state

  session-state: 
    storage: Per Request (Memory Only)

  quick-picks: 
    show-quick-picks: false

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

