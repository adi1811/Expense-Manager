      select user_name as d,
          user_id as r
              from user_detail
                  where user_id in (
                      select user_id from user_group where group_id = :P4_group_id
                  );
    display-extra-values: true
    display-null-value: true

  cascading-list-of-values: 
    parent-item(s): 
    - P4_GROUP_ID
    items-to-submit: 
    - P4_GROUP_ID
    parent-required: true

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      if :P4_EXPENSE_ID is not null
      then
          select 
              LISTAGG(borrower_user_id,':')
             into :P4_INCLUDED_MEMBERS
             from amount_detail
             where group_id = :P4_GROUP_ID
             and expense_id = :P4_EXPENSE_ID
             and rownum = 1;
          return :P4_INCLUDED_MEMBERS;
      end if;
      return null;
