processes: 
- # ====== Process: insert in amount_detail table ==============
  id: 154784939087947212007
  identification: 
    name: insert in amount_detail table
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare 
          v_selected apex_t_varchar2;
          v_count number;
      Begin
         v_selected := apex_string.split(:P4_INCLUDED_MEMBERS,':');
         v_count := v_selected.count;
         for i in 1..v_selected.count loop
          insert into amount_detail(
                  group_id,
                  expense_id,
                  borrower_user_id,
                  borrow_amount,
                  lender_user_id,
                  lending_amount
          ) VALUES(
              :P4_GROUP_ID,
              :P4_EXPENSE_ID,
              v_selected(i),
              :P4_EXPENSE_AMOUNT/v_count,
              :P4_PAYER,
              :P4_EXPENSE_AMOUNT/v_count
          );
          END LOOP;
      END;

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: inserted

  error: 
    error-message: error
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: SAVE # 154787842431705757484

- # ====== Process: update the expense =========================
  id: 154784942321529212040
  identification: 
    name: update the expense
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare
          v_select_member apex_t_varchar2;
          v_count number;
      Begin
          update expense 
              set
                  expense_name = :P4_EXPENSE_NAME,
                  expense_type = :P4_EXPENSE_TYPE,
                  expense_amount = :P4_EXPENSE_AMOUNT,
                  transcation_date = :P4_TRANSCATION_DATE,
                  note = :P4_NOTE
              where
                  expense_id = :P4_EXPENSE_ID;
          
          v_select_member := apex_string.split(:P4_INCLUDED_MEMBERS,':');
              delete from amount_detail
                  where expense_id = :P4_EXPENSE_ID;
      
           v_count := v_select_member.count;
          for i in 1..v_select_member.count loop
              insert into amount_detail(
                  group_id,
                  expense_id,
                  borrower_user_id,
                  borrow_amount,
                  lender_user_id,
                  lending_amount
               ) VALUES(
              :P4_GROUP_ID,
              :P4_EXPENSE_ID,
              v_select_member(i),
              :P4_EXPENSE_AMOUNT/v_count,
              :P4_PAYER,
              :P4_EXPENSE_AMOUNT/v_count
              );
          end loop;
      end;
      
          
      

  execution: 
    sequence: 30
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: UPDATE # 154784942219210212039

